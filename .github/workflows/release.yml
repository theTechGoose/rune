name: release

# Deploy model:
#   - merge into `main`        -> rebuilds the rolling `latest` release (the one
#                                 `install.sh` pulls). This is the deploy.
#   - push a `vX.Y.Z` tag      -> a pinned snapshot release (install with
#                                 RUNE_VERSION=vX.Y.Z); does NOT become "latest".
# `develop` never deploys — it's the integration branch.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Reset the moving `latest` release so its assets are replaced cleanly.
  # Only on a main-branch deploy; skipped for tag pushes.
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Reset rolling 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --cleanup-tag --yes -R "${{ github.repository }}" || true

  build:
    needs: [prepare]
    # Run for main deploys AND v* tags. always() so it still runs when `prepare`
    # is skipped (tag pushes).
    if: ${{ always() && !cancelled() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ${{ matrix.os }}
    # Generous ceiling so a real hang fails fast instead of burning a runner.
    # (Note: this governs EXECUTION time, not queue wait — the old Intel job was
    # killed by GitHub's 24h *queue* limit because macos-13 runners were
    # unavailable. The fix is below: build x86_64-darwin by CROSS-COMPILING on a
    # plentiful macos-latest (Apple-silicon) runner, so no Intel runner is needed.)
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest            # was macos-13; cross-compiled from arm64
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "rolling=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "rolling=true" >> "$GITHUB_OUTPUT"
          fi

      # Build for matrix.target explicitly (instead of `deno task build`, which is
      # host-only) so we can cross-compile x86_64-apple-darwin on an arm64 runner.
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build rune + rune-lsp + rune-syntax (target ${{ matrix.target }})
        run: |
          deno run --allow-read --allow-run --allow-write src/bootstrap/config.ts
          deno run --allow-read --allow-write scripts/gen-shape-docs.ts
          deno compile --allow-read --allow-write --allow-net --allow-env --allow-run \
            --target ${{ matrix.target }} -o dist/rune src/bootstrap/mod.ts
          (cd lang && cargo build --release --target ${{ matrix.target }})
          mkdir -p dist
          cp "lang/target/${{ matrix.target }}/release/rune-lsp" \
             "lang/target/${{ matrix.target }}/release/rune-syntax" dist/

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - --force dist/rune dist/rune-lsp dist/rune-syntax

      - name: Package
        run: |
          tar -C dist -czf "rune-${{ matrix.target }}.tar.gz" rune rune-lsp rune-syntax
          shasum -a 256 "rune-${{ matrix.target }}.tar.gz" > "rune-${{ matrix.target }}.tar.gz.sha256"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.rolling == 'true' && 'latest (main)' || steps.rel.outputs.tag }}
          # The rolling 'latest' is the canonical install target (make_latest);
          # pinned v* snapshots are not, so they don't hijack `install.sh`.
          make_latest: ${{ steps.rel.outputs.rolling == 'true' }}
          prerelease: false
          files: |
            rune-${{ matrix.target }}.tar.gz
            rune-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true
