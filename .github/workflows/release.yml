name: release

# Deploy model:
#   - merge into `main`        -> rebuilds the rolling `latest` release (the one
#                                 `install.sh` pulls by default). This is the deploy.
#   - push to `develop`        -> rebuilds the rolling `develop` release (install
#                                 with RUNE_VERSION=develop); does NOT become
#                                 "latest", so it never disturbs stable users.
#   - push a `vX.Y.Z` tag      -> a pinned snapshot release (install with
#                                 RUNE_VERSION=vX.Y.Z); does NOT become "latest".
on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Ensure the rolling release EXISTS — never delete it. Deleting-then-recreating
  # left a ~2-min window where `latest` was absent, so installers 404'd or fell
  # back to an old pinned tag. Here we just create it if missing; the build jobs
  # overwrite its (fixed-name) assets in place, so `latest` is always downloadable.
  prepare:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure rolling release exists for this branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$([ "$GITHUB_REF" = "refs/heads/main" ] && echo latest || echo develop)
          gh release view "$tag" -R "${{ github.repository }}" >/dev/null 2>&1 \
            || gh release create "$tag" -R "${{ github.repository }}" \
                 --title "$tag" --notes "rolling release" --latest=false

  build:
    needs: [prepare]
    # Run for main/develop deploys AND v* tags. always() so it still runs when
    # `prepare` is skipped (tag pushes).
    if: ${{ always() && !cancelled() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ${{ matrix.os }}
    # Generous ceiling so a real hang fails fast instead of burning a runner.
    # (Note: this governs EXECUTION time, not queue wait — the old Intel job was
    # killed by GitHub's 24h *queue* limit because macos-13 runners were
    # unavailable. The fix is below: build x86_64-darwin by CROSS-COMPILING on a
    # plentiful macos-latest (Apple-silicon) runner, so no Intel runner is needed.)
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest            # was macos-13; cross-compiled from arm64
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "rolling=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/develop ]]; then
            echo "tag=develop" >> "$GITHUB_OUTPUT"
            echo "rolling=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "rolling=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

      # Build for matrix.target explicitly (instead of `deno task build`, which is
      # host-only) so we can cross-compile x86_64-apple-darwin on an arm64 runner.
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build rune + rune-lsp + rune-syntax (target ${{ matrix.target }})
        run: |
          deno run --allow-read --allow-run --allow-write src/bootstrap/config.ts
          deno run --allow-read --allow-write scripts/gen-shape-docs.ts
          deno compile --allow-read --allow-write --allow-net --allow-env --allow-run \
            --target ${{ matrix.target }} -o dist/rune src/bootstrap/mod.ts
          (cd lang && cargo build --release --target ${{ matrix.target }})
          mkdir -p dist
          cp "lang/target/${{ matrix.target }}/release/rune-lsp" \
             "lang/target/${{ matrix.target }}/release/rune-syntax" dist/

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - --force dist/rune dist/rune-lsp dist/rune-syntax

      - name: Package
        # The Claude Code skill ships INSIDE the tarball so a pinned install gets
        # the skill matching its binaries (install.sh extracts and places it).
        run: |
          cp skills/rune/SKILL.md dist/
          tar -C dist -czf "rune-${{ matrix.target }}.tar.gz" rune rune-lsp rune-syntax SKILL.md
          shasum -a 256 "rune-${{ matrix.target }}.tar.gz" > "rune-${{ matrix.target }}.tar.gz.sha256"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag == 'latest' && 'latest (main)' || steps.rel.outputs.tag == 'develop' && 'develop (rolling)' || steps.rel.outputs.tag }}
          # Only the rolling 'latest' (main) is the canonical install target
          # (make_latest); 'develop' and pinned v* snapshots are NOT, so they
          # don't hijack the default `install.sh`.
          make_latest: ${{ steps.rel.outputs.make_latest }}
          prerelease: false
          files: |
            rune-${{ matrix.target }}.tar.gz
            rune-${{ matrix.target }}.tar.gz.sha256
          fail_on_unmatched_files: true

      # Releases are the source of truth for EVERYTHING shipped: the installer,
      # uninstaller, and skill are standalone assets too, so install.sh and
      # `rune update` fetch them version-matched from the release instead of a
      # branch ref. One leg only — parallel uploads of the same asset name race.
      - name: Publish installer + skill (shared assets)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag == 'latest' && 'latest (main)' || steps.rel.outputs.tag == 'develop' && 'develop (rolling)' || steps.rel.outputs.tag }}
          make_latest: ${{ steps.rel.outputs.make_latest }}
          prerelease: false
          files: |
            scripts/install.sh
            scripts/uninstall.sh
            skills/rune/SKILL.md
          fail_on_unmatched_files: true
